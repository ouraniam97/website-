<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>
</head>

<body>

    <header>
        <h1>Welcome to My Website</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>About This Page</h2>
            <p>This is a simple example of a webpage using semantic HTML elements.</p>
        </section>

        <section id="gallery">
            <h2>Image Gallery</h2>
            <img src="https://via.placeholder.com/200" alt="Placeholder Image 1">
            <img src="https://via.placeholder.com/200" alt="Placeholder Image 2">
            <img src="https://via.placeholder.com/200" alt="Placeholder Image 3">
        </section>

        <section id="contact">
            <h2>Useful Link</h2>
            <p>Visit
                <a href="https://www.wikipedia.org" target="_blank">
                    Wikipedia
                </a>
                for more information.
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>

</html>
